# Coverage matrix for ground truth mining.
# Adjusted after first batch: network over-represented, test/infra under-represented.

# Exclude over-represented and low-quality categories
exclude:
  - failure_type: network
  - failure_type: unknown
  - bug_location: unknown

buckets:
  # --- FILLING THE 'TEST' BUG GAP ---
  - language: typescript
    failure_type: assertion
    bug_location: test
    target: 4
  - language: python
    failure_type: assertion
    bug_location: test
    target: 4
  - language: go
    failure_type: assertion
    bug_location: test
    target: 3

  # --- FILLING THE 'INFRA' FAILURE TYPE GAP ---
  - language: typescript
    failure_type: infra
    target: 3
  - language: python
    failure_type: infra
    target: 3
  - language: go
    failure_type: infra
    target: 3

  # --- BALANCING PRODUCTION ASSERTIONS ---
  - language: typescript
    failure_type: assertion
    bug_location: production
    target: 2
  - language: python
    failure_type: assertion
    bug_location: production
    target: 2
  - language: go
    failure_type: assertion
    bug_location: production
    target: 2

  # --- TIMEOUTS (still need more) ---
  - language: typescript
    failure_type: timeout
    target: 3
  - language: python
    failure_type: timeout
    target: 3
  - language: go
    failure_type: timeout
    target: 2

  # No catch-all bucket — only accept what we explicitly want
