# Coverage matrix for ground truth mining.
# Expanded for 100+ case target (was 35, need 3x more).

# Only exclude truly low-quality categories
exclude:
  - failure_type: unknown
  - bug_location: unknown

buckets:
  # --- ASSERTIONS ---
  - language: typescript
    failure_type: assertion
    bug_location: test
    target: 10
  - language: typescript
    failure_type: assertion
    bug_location: production
    target: 10
  - language: python
    failure_type: assertion
    bug_location: test
    target: 8
  - language: python
    failure_type: assertion
    bug_location: production
    target: 8
  - language: go
    failure_type: assertion
    bug_location: test
    target: 6
  - language: go
    failure_type: assertion
    bug_location: production
    target: 6
  - language: java
    failure_type: assertion
    bug_location: test
    target: 6
  - language: java
    failure_type: assertion
    bug_location: production
    target: 6

  # --- TIMEOUTS ---
  - language: typescript
    failure_type: timeout
    target: 8
  - language: python
    failure_type: timeout
    target: 6
  - language: go
    failure_type: timeout
    target: 4
  - language: java
    failure_type: timeout
    target: 4

  # --- INFRASTRUCTURE ---
  - language: typescript
    failure_type: infra
    target: 6
  - language: python
    failure_type: infra
    target: 6
  - language: go
    failure_type: infra
    target: 4
  - language: java
    failure_type: infra
    target: 4

  # --- NETWORK ---
  - language: typescript
    failure_type: network
    target: 4
  - language: python
    failure_type: network
    target: 4
  - language: go
    failure_type: network
    target: 3
  - language: java
    failure_type: network
    target: 3

  # --- FLAKES ---
  - language: typescript
    failure_type: flake
    target: 3
  - language: python
    failure_type: flake
    target: 3

  # Catch-all for categories not explicitly listed
  - target: 20
